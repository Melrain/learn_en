services:
  mongodb:
    image: mongo:7
    container_name: learn_en_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: learn_en_dev
      MONGO_INITDB_DATABASE: learn_en
    volumes:
      - mongodb_data:/data/db

  minio:
    image: minio/minio:latest
    container_name: learn_en_minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web 控制台
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

volumes:
  mongodb_data:
  minio_data:
